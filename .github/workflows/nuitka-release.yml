# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: "TouCAN-Plot Release"

on:
  push:
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write # Required to create/update releases

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_release:
    runs-on: windows-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 5

    - name: "Print Debug info"
      run: |
        echo $env:USERPROFILE
        echo $env:PATH
        echo "$PWD"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        python -m pip install uv
        uv venv .venv
        .\.venv\Scripts\activate
        uv sync

    - name: Build
      run: |
        .\.venv\Scripts\activate
        uv build

    - name: Distribute Executable
      run: |
        .\.venv\Scripts\activate
        python -m nuitka --onefile --assume-yes-for-downloads --follow-imports --enable-plugin=pyqt6 --include-data-dir=src/toucan_plot/assets=assets --include-package=chardet --include-package-data=chardet --include-package=scienceplots --include-package-data=scienceplots src/toucan_plot/main.py --output-filename=dist/toucan-plot.exe

    - name: Create and Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/toucan-plot.exe
        generate_release_notes: true # Auto-generates notes from commits
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
