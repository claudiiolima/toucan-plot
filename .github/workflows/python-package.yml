# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: "TouCAN-Plot"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 5

    - name: "Print Debug info"
      run: |
        echo $env:USERPROFILE
        echo $env:PATH
        echo "$PWD"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        python -m pip install uv
        uv venv .venv
        .\.venv\Scripts\activate
        uv sync

    - name: Build
      run: |
        .\.venv\Scripts\activate
        uv build

    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist-windows
        path: dist

  build-ubuntu:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 5

    - name: "Print Debug info"
      run: |
        echo $env:USERPROFILE
        echo $env:PATH
        echo "$PWD"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        python -m pip install uv
        uv venv .venv
        source .venv/bin/activate
        uv pip install -e .

    - name: Build
      run: |
        source .venv/bin/activate
        uv build
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist-ubuntu
        path: dist

  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-ubuntu]
    # Only publish on direct pushes to master (avoid publishing for PRs).
    if: github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v6

    - name: Download Ubuntu dist artifact
      uses: actions/download-artifact@v4
      with:
        name: dist-ubuntu
        path: dist-ubuntu

    - name: Download Windows dist artifact
      uses: actions/download-artifact@v4
      with:
        name: dist-windows
        path: dist-windows

    - name: Merge dists
      run: |
        mkdir -p dist
        # copy files from downloaded artifacts into a single dist/ folder
        if [ -d dist-ubuntu ]; then cp -R dist-ubuntu/* dist/ || true; fi
        if [ -d dist-windows ]; then cp -R dist-windows/* dist/ || true; fi

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install twine
      run: |
        python -m pip install --upgrade pip
        pip install twine

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        # Upload everything in dist/ to PyPI using the API token stored in secrets.PYPI_API_TOKEN
        python -m twine upload --non-interactive dist/*
